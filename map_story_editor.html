<html lang="ja">

  <style>

    *{box-sizing:border-box}html,body{height:100%;margin:0}body{background:radial-gradient(circle at 18% 0%,rgba(86,130,255,.18),transparent 28%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;overflow:hidden}button,input,select,textarea{font:inherit}button{cursor:pointer}input,select,textarea{width:100%;color:var(--text);background:var(--input);border:1px solid var(--line);border-radius:10px;padding:8px 10px;outline:none}textarea{resize:vertical;min-height:120px;line-height:1.55;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;font-size:12px}input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,189,79,.12)}label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin:0 0 6px}.app{height:100%;display:grid;grid-template-rows:64px 1fr}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 16px;border-bottom:1px solid var(--line);background:rgba(9,15,30,.94);backdrop-filter:blur(14px);position:relative;z-index:20}.brand{display:flex;align-items:baseline;gap:10px;white-space:nowrap}.brand strong{color:var(--accent);font-size:18px;letter-spacing:.03em}.brand span{color:var(--muted);font-size:12px}.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.layout{min-height:0;display:grid;grid-template-columns:320px minmax(430px,1fr) minmax(440px,54vw)}.sidebar{min-height:0;display:grid;grid-template-rows:auto auto 1fr auto;border-right:1px solid var(--line);background:rgba(8,14,27,.78)}.main{min-height:0;overflow:auto;padding:14px}.preview{min-height:0;display:grid;grid-template-rows:auto 1fr auto;border-left:1px solid var(--line);background:rgba(7,12,22,.92)}.searchbox{padding:12px;border-bottom:1px solid var(--line);display:grid;gap:8px}.navtabs{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--line);overflow-x:auto}.navtab,.tab{flex:0 0 auto;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:10px;padding:8px 10px;font-weight:900;font-size:12px}.navtab.active,.tab.active{color:var(--accent);background:rgba(245,189,79,.11);border-color:rgba(245,189,79,.25)}.list{overflow:auto;padding:8px}.row{width:100%;text-align:left;color:inherit;background:rgba(255,255,255,.035);border:1px solid transparent;border-radius:13px;padding:10px;margin-bottom:8px}.row:hover{border-color:var(--line);background:rgba(255,255,255,.06)}.row.active{border-color:rgba(245,189,79,.72);background:rgba(245,189,79,.10)}.row b{display:block;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;color:var(--muted);font-size:11px}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:999px;padding:3px 7px;color:var(--muted);font-size:11px}.pill.ok{color:#c8ffe2;border-color:rgba(72,214,141,.4);background:rgba(72,214,141,.08)}.pill.warn{color:#ffe9a9;border-color:rgba(255,213,104,.4);background:rgba(255,213,104,.08)}.pill.danger{color:#ffd0d7;border-color:rgba(255,99,122,.4);background:rgba(255,99,122,.08)}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:10px;padding:8px 11px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}.btn:hover{filter:brightness(1.08)}.btn.primary{background:#255ec8;border-color:#397bff}.btn.gold{background:#8a5b16;border-color:#d69b2b}.btn.green{background:#12683f;border-color:#23a96b}.btn.red{background:#842237;border-color:#c64b60}.btn.ghost{background:transparent}.btn.small{padding:5px 7px;font-size:12px;border-radius:8px}.sidebar-actions{border-top:1px solid var(--line);padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.card{background:rgba(16,26,47,.94);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 10px 30px rgba(0,0,0,.16)}.card h2{margin:0 0 12px;color:var(--accent2);font-size:15px;display:flex;justify-content:space-between;align-items:center;gap:10px}.tabs{display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:12px}.grid{display:grid;gap:10px}.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.hint{color:var(--muted);font-size:12px;line-height:1.6}.mini{font-size:11px;color:var(--muted)}.preview-head{padding:10px 12px;border-bottom:1px solid var(--line);display:grid;gap:8px}.preview-title{display:flex;justify-content:space-between;align-items:center;gap:10px}.preview-title b{color:var(--accent)}.canvas-wrap{position:relative;overflow:auto;background:#020711}.canvas-stage{position:relative;display:inline-block;min-width:100%;min-height:100%;padding:16px}.map-canvas{image-rendering:pixelated;background:#060b14;border:1px solid var(--line);box-shadow:var(--shadow);display:block}.coord-box{position:absolute;left:20px;top:20px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.18);border-radius:9px;color:#fff;padding:5px 8px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;pointer-events:none}.preview-foot{border-top:1px solid var(--line);padding:10px 12px;background:rgba(8,14,27,.78);max-height:180px;overflow:auto}.tile-palette{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px}.tile-btn{min-height:44px;border:1px solid var(--line);background:var(--panel3);border-radius:10px;color:var(--text);font-weight:900;display:grid;place-items:center;position:relative;overflow:hidden}.tile-btn.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,189,79,.14)}.tile-btn small{position:absolute;left:5px;top:3px;color:#fff;text-shadow:0 1px 3px #000;font-size:11px}.tile-swatch{width:100%;height:100%;display:grid;place-items:center;background-size:cover;background-position:center}.object-list{display:grid;gap:8px}.object-row{display:grid;grid-template-columns:74px 1fr auto;gap:8px;align-items:start;border:1px solid var(--line);border-radius:12px;padding:8px;background:rgba(255,255,255,.035)}.object-row textarea{min-height:74px}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{color:var(--muted);font-size:11px;text-align:left;padding:0 7px}.table td{background:rgba(255,255,255,.035);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:7px;vertical-align:top}.table td:first-child{border-left:1px solid var(--line);border-radius:10px 0 0 10px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 10px 10px 0}.split2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.jsonbox{min-height:420px;white-space:pre;overflow:auto;color:#b8fff0;background:#030711}.message{border:1px solid rgba(98,215,255,.28);background:rgba(98,215,255,.07);border-radius:12px;padding:10px;color:#d8f6ff;font-size:12px;line-height:1.6;margin-bottom:10px}.warnbox{border-color:rgba(255,213,104,.36);background:rgba(255,213,104,.08);color:#ffe9a9}.dangerbox{border-color:rgba(255,99,122,.36);background:rgba(255,99,122,.08);color:#ffd0d7}.script-lines{display:grid;gap:8px}.script-line{display:grid;grid-template-columns:92px 120px 1fr auto;gap:8px;align-items:start;border:1px solid var(--line);border-radius:12px;padding:8px;background:rgba(255,255,255,.035)}.script-line textarea{min-height:64px}.action-row{display:grid;grid-template-columns:120px 1fr auto;gap:8px;align-items:start;border:1px solid var(--line);border-radius:12px;padding:8px;background:rgba(255,255,255,.035);margin-bottom:8px}.kbd{font-family:ui-monospace,Menlo,Consolas,monospace;color:#ffe2a3}.asset-select{display:grid;grid-template-columns:1fr auto;gap:8px}.asset-preview{width:44px;height:44px;border:1px solid var(--line);border-radius:10px;background:#07101f;background-size:contain;background-position:center;background-repeat:no-repeat}.hidden{display:none!important}@media(max-width:1320px){.layout{grid-template-columns:290px minmax(420px,1fr) minmax(380px,45vw)}.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}.script-line{grid-template-columns:80px 110px 1fr}.preview{font-size:13px}}@media(max-width:1040px){body{overflow:auto}.app{height:auto;min-height:100%}.layout{display:block}.sidebar,.main,.preview{min-height:auto}.preview{height:70vh}.sidebar{height:420px}.topbar{position:sticky;top:0}.split2{grid-template-columns:1fr}}
    .placement-card{border-color:rgba(98,215,255,.34);background:linear-gradient(180deg,rgba(20,42,69,.96),rgba(13,25,46,.96))}
    .tool-tabs{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:7px;margin-bottom:12px}
    .tool-tab{border:1px solid var(--line);border-radius:10px;background:var(--panel3);color:var(--muted);padding:9px 7px;font-weight:900;font-size:12px}
    .tool-tab.active{color:#fff;border-color:var(--accent2);background:#174a70;box-shadow:0 0 0 3px rgba(98,215,255,.12)}
    .asset-browser{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px;max-height:310px;overflow:auto;padding:3px}
    .asset-chip{min-height:88px;border:1px solid var(--line);border-radius:11px;background:rgba(0,0,0,.18);color:var(--text);padding:6px;display:grid;grid-template-rows:50px auto;gap:4px;text-align:center;overflow:hidden}
    .asset-chip.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,189,79,.15)}
    .asset-chip img{width:100%;height:50px;object-fit:contain;image-rendering:pixelated;background:rgba(0,0,0,.2);border-radius:7px}
    .asset-chip span{font-size:10px;line-height:1.25;overflow-wrap:anywhere}
    .tool-panel{display:none}.tool-panel.active{display:block}
    .brush-status{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:10px;padding:9px;border:1px solid rgba(98,215,255,.25);border-radius:10px;background:rgba(98,215,255,.06)}
    .mode-help{color:#d9f7ff;font-size:12px;line-height:1.55}
    .danger-note{color:#ffd0d7}.recommended{outline:1px solid rgba(72,214,141,.42)}
    @media(max-width:1320px){.tool-tabs{grid-template-columns:repeat(3,minmax(0,1fr))}.asset-browser{grid-template-columns:repeat(auto-fill,minmax(76px,1fr))}}
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><strong>PRISMA ABYSS</strong><span>Map / Story Editor</span></div>
    <div class="top-actions">
      <button class="btn green" data-act="validate">検証</button>
      <button class="btn gold" data-act="exportMap">map.js出力</button>
      <button class="btn gold" data-act="exportStory">story.js出力</button>
      <button class="btn primary" data-act="exportBoth">両方出力</button>
      <button class="btn" data-act="reload">再読込</button>
    </div>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <div class="searchbox">
        <input id="search" placeholder="マップ / イベント / 会話を検索" />
        <div class="grid cols-2">
          <select id="typeFilter"><option value="all">すべて</option><option value="world">ワールド</option><option value="fixed">固定エリア</option><option value="dungeon">固定ダンジョン</option><option value="script">会話</option><option value="event">イベント</option></select>
          <select id="sortMode"><option value="kind">種別順</option><option value="name">名前順</option><option value="size">サイズ順</option></select>
        </div>
      </div>
      <div class="navtabs">
        <button class="navtab active" data-main-tab="maps">マップ</button>
        <button class="navtab" data-main-tab="story">ストーリー</button>
        <button class="navtab" data-main-tab="data">マスタ</button>
        <button class="navtab" data-main-tab="export">出力</button>
      </div>
      <div class="list" id="entityList"></div>
      <div class="sidebar-actions">
        <button class="btn primary" data-act="addMap">+ エリア</button>
        <button class="btn primary" data-act="addScript">+ 会話</button>
      </div>
    </aside>
    <main class="main" id="mainPane"></main>
    <section class="preview">
      <div class="preview-head">
        <div class="preview-title"><b id="previewName">Preview</b><span id="previewStats" class="pill"></span></div>
        <div class="toolbar">
          <button class="btn small" data-act="zoomOut">−</button>
          <input id="zoomRange" type="range" min="0.5" max="3" step="0.25" value="1" style="width:120px" />
          <button class="btn small" data-act="zoomIn">＋</button>
          <button class="btn small" data-act="fit">等倍</button>
          <select id="drawMode" style="width:150px"><option value="select">座標選択</option><option value="paint">1マス / ペン</option><option value="fillRect">矩形配置</option></select>
          <label class="pill"><input type="checkbox" id="showGrid" checked style="width:auto;margin-right:5px">Grid</label>
          <label class="pill"><input type="checkbox" id="showObjects" checked style="width:auto;margin-right:5px">Objects</label>
        </div>
      </div>
      <div class="canvas-wrap" id="canvasWrap"><div class="canvas-stage"><canvas id="mapCanvas" class="map-canvas"></canvas><div class="coord-box" id="coordBox">x: -, y: -</div></div></div>
      <div class="preview-foot" id="coordInfo"></div>
    </section>
  </div>
</div>
<script>
(function(){
  'use strict';
  const $ = (id) => document.getElementById(id);
  const esc = (v) => String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const clone = (v) => JSON.parse(JSON.stringify(v ?? null));
  const num = (v, d=0) => Number.isFinite(Number(v)) ? Number(v) : d;
  const uid = () => `${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
  const actionTypes = ['CONV','ALLY','STEP','SUB','LOG','HEAL','BOSS','FLAG','UNLOCK','ITEM','QUEST_ACCEPT','QUEST_COMPLETE','STORY_DEFEAT','FIELD_CUTSCENE','MAP_VISUAL','START_FIXED_DUNGEON','START_ABYSS_DUNGEON','IF_FLAG','IF','CHOICE','MAP_CHANGE','EVENT','TEMP_LB_START','TEMP_LB_CLEAR'];
  const renderShared = window.MapRenderShared;

  const state = {
    tab:'maps', search:'', typeFilter:'all', sortMode:'kind', selectedKey:'map:world:WORLD', selectedTile:'T', selectedCoord:{x:0,y:0},
    drawMode:'select', zoom:1, showGrid:true, showObjects:true, drag:false, rectStart:null, dirty:false,
    editorTool:'tile', selectedProp:'', selectedTextile:'castle_carpet', selectedHazard:'ice',
    textileWidth:3, textileHeight:5, propSearch:'', propTheme:'all', propRole:'all', lastPaintCoord:null,
    data:{}, maps:[], scripts:[], events:[], images:new Map(), imageBad:new Set(), validation:[], jsonDraft:'', scriptJsonDraft:'', eventJsonDraft:''
  };

  function safeGlobalData(){
    const storyDataSource = (typeof STORY_MANAGER_DATA !== 'undefined') ? STORY_MANAGER_DATA : {
      maxMainStoryProgress: (typeof StoryManager !== 'undefined' ? StoryManager.maxMainStoryProgress : {storyStep:0,subStep:0}),
      storyObjectives: (typeof StoryManager !== 'undefined' ? StoryManager.storyObjectives : {}),
      dungeonObjectiveMilestones: (typeof StoryManager !== 'undefined' ? StoryManager.dungeonObjectiveMilestones : []),
      scripts: (typeof StoryManager !== 'undefined' ? StoryManager.scripts : {}),
      events: (typeof StoryManager !== 'undefined' ? StoryManager.events : {})
    };
    return {
      storyMapMutations: clone(typeof STORY_MAP_MUTATIONS !== 'undefined' ? STORY_MAP_MUTATIONS : (window.STORY_MAP_MUTATIONS || {})),
      tileThemes: clone(typeof TILE_THEMES !== 'undefined' ? TILE_THEMES : (window.TILE_THEMES || {})),
      storyData: clone(typeof STORY_DATA !== 'undefined' ? STORY_DATA : (window.STORY_DATA || {areas:{}})),
      seaEncounterMonsters: clone(typeof SEA_ENCOUNTER_MONSTERS !== 'undefined' ? SEA_ENCOUNTER_MONSTERS : (window.SEA_ENCOUNTER_MONSTERS || [])),
      fieldEncounterZones: clone(typeof FIELD_ENCOUNTER_ZONES !== 'undefined' ? FIELD_ENCOUNTER_ZONES : (window.FIELD_ENCOUNTER_ZONES || [])),
      mapData: clone(typeof MAP_DATA !== 'undefined' ? MAP_DATA : (window.MAP_DATA || [])),
      fixedTileOverlays: clone(typeof FIXED_TILE_OVERLAYS !== 'undefined' ? FIXED_TILE_OVERLAYS : (window.FIXED_TILE_OVERLAYS || {})),
      fixedOverlayBaseTiles: clone(typeof FIXED_OVERLAY_BASE_TILES !== 'undefined' ? FIXED_OVERLAY_BASE_TILES : (window.FIXED_OVERLAY_BASE_TILES || {})),
      worldBridges: clone(typeof WORLD_BRIDGES !== 'undefined' ? WORLD_BRIDGES : (window.WORLD_BRIDGES || [])),
      dungeonWallFaceThemes: clone(typeof DUNGEON_WALL_FACE_THEMES !== 'undefined' ? DUNGEON_WALL_FACE_THEMES : (window.DUNGEON_WALL_FACE_THEMES || {})),
      mapFloorDecorThemes: clone(typeof MAP_FLOOR_DECOR_THEMES !== 'undefined' ? MAP_FLOOR_DECOR_THEMES : (window.MAP_FLOOR_DECOR_THEMES || {})),
      fixedMaps: clone(typeof FIXED_MAPS !== 'undefined' ? FIXED_MAPS : (window.FIXED_MAPS || {})),
      fixedDungeonMaps: clone(typeof FIXED_DUNGEON_MAPS !== 'undefined' ? FIXED_DUNGEON_MAPS : (window.FIXED_DUNGEON_MAPS || {})),
      authoredMapPropPlacements: clone(typeof AUTHORED_MAP_PROP_PLACEMENTS !== 'undefined' ? AUTHORED_MAP_PROP_PLACEMENTS : (window.AUTHORED_MAP_PROP_PLACEMENTS || [])),
      storyManagerData: clone(storyDataSource || {}),
      graphics: clone(window.PRISMA_ASSETS?.graphics || {}),
      items: clone(window.ITEMS_DATA || window.DB?.ITEMS || []),
      monsters: clone(window.MonsterData?.allBases || window.MonsterData?.bases || []),
      quests: clone(window.QUEST_DATA || {}),
      chars: clone(window.DB?.CHARACTERS || [])
    };
  }

  function init(){
    state.data = safeGlobalData();
    rebuildEntities();
    bindEvents();
    renderAll();
  }

  function rebuildEntities(){
    state.maps = [];
    const md = state.data.mapData || [];
    state.maps.push({key:'map:world:WORLD', type:'world', id:'WORLD', name:'ワールドマップ', subtitle:`${md[0]?.length || 0}x${md.length}`, get:()=>worldMapProxy(), set:(v)=>{ state.data.mapData = normalizeRows(v.tiles || v, v.width, v.height); }});
    Object.entries(state.data.fixedMaps || {}).forEach(([id, m]) => {
      state.maps.push({key:`map:fixed:${id}`, type:'fixed', id, name:m.name || id, subtitle:`${m.width || rowWidth(m.tiles)}x${m.height || (m.tiles||[]).length}`, get:()=>state.data.fixedMaps[id], set:(v)=>{ state.data.fixedMaps[id]=v; }});
    });
    Object.entries(state.data.fixedDungeonMaps || {}).forEach(([id, d]) => {
      if (Array.isArray(d.floors) && d.floors.length) {
        d.floors.forEach((f, i) => state.maps.push({key:`map:dungeon:${id}:${i}`, type:'dungeon', id, floorIndex:i, base:d, name:`${d.name || id} / ${f.floorLabel || f.label || `${i+1}階`}`, subtitle:`${f.width || d.width || rowWidth(f.tiles)}x${f.height || d.height || (f.tiles||[]).length}`, get:()=>state.data.fixedDungeonMaps[id].floors[i], set:(v)=>{ state.data.fixedDungeonMaps[id].floors[i]=v; }}));
      } else {
        state.maps.push({key:`map:dungeon:${id}:base`, type:'dungeon', id, name:d.name || id, subtitle:`${d.width || rowWidth(d.tiles)}x${d.height || (d.tiles||[]).length}`, get:()=>state.data.fixedDungeonMaps[id], set:(v)=>{ state.data.fixedDungeonMaps[id]=v; }});
      }
    });
    state.scripts = Object.keys(state.data.storyManagerData.scripts || {}).sort();
    state.events = Object.keys(state.data.storyManagerData.events || {}).sort();
    if (!findEntity(state.selectedKey)) state.selectedKey = state.maps[0]?.key || '';
  }

  function worldMapProxy(){
    const rows = state.data.mapData || [];
    return { name:'ワールドマップ', width: rowWidth(rows), height: rows.length, themeKey:'WORLD', tiles: rows, isWorld:true };
  }
  function rowWidth(rows){ return Array.isArray(rows) ? Math.max(0, ...rows.map(r => String(r).length)) : 0; }
  function normalizeRows(rows, width=null, height=null){
    const src = Array.isArray(rows) ? rows : [];
    const h = height || src.length;
    const w = width || rowWidth(src);
    const out=[];
    for(let y=0;y<h;y++){ const s=String(src[y] || ''); out.push((s + 'T'.repeat(w)).slice(0,w)); }
    return out;
  }
  function findEntity(key){
    if (!key) return null;
    if (key.startsWith('map:')) return state.maps.find(m => m.key === key) || null;
    if (key.startsWith('script:')) return {key, type:'script', id:key.slice(7), name:key.slice(7)};
    if (key.startsWith('event:')) return {key, type:'event', id:key.slice(6), name:key.slice(6)};
    return null;
  }
  function selectedMapEntity(){ const e=findEntity(state.selectedKey); return e?.key?.startsWith('map:') ? e : null; }
  function selectedMap(){ return selectedMapEntity()?.get() || worldMapProxy(); }

  function handleAction(act, btn){

    if (act === 'addAction') addAction(btn.dataset.phase || 'actions');

      rows.push(...state.maps.map(m => ({...m, group:'map'})));

    const tw=$('textileWidth'); if(tw) tw.oninput=()=>{state.textileWidth=Math.max(1,num(tw.value,3));};
    const th=$('textileHeight'); if(th) th.oninput=()=>{state.textileHeight=Math.max(1,num(th.value,5));};
    const ps=$('propSearch'); if(ps) ps.oninput=()=>{state.propSearch=ps.value; renderMain(); requestAnimationFrame(()=>{const next=$('propSearch');if(next){next.focus();next.setSelectionRange(next.value.length,next.value.length);}});};
    const pt=$('propTheme'); if(pt) pt.onchange=()=>{state.propTheme=pt.value; renderMain();};
    const pr=$('propRole'); if(pr) pr.onchange=()=>{state.propRole=pr.value; renderMain();};
    ['mapName','mapTheme','mapBattleBg'].forEach(id => { const el=$(id); if (el) el.addEventListener('change', updateMapBasics); });

  function themeOptions(value){ return Object.keys(state.data.tileThemes || {}).sort().map(k => `<option value="${esc(k)}"${k===value?' selected':''}>${esc(k)}</option>`).join(''); }
  function getThemeKey(map, type=null){ return map.themeKey || map.areaKey || map.baseName || (type==='world' || map.isWorld ? 'WORLD' : (map.isDungeon ? 'ABYSS' : 'FIELD')); }
  function updateMapBasics(){
    const ent=selectedMapEntity(); if (!ent) return; const map=ent.get();
    if (!map.isWorld) map.name = $('mapName').value;
    map.themeKey = $('mapTheme').value || map.themeKey;
    map.battleBg = $('mapBattleBg').value || map.battleBg;
    ent.set(map); state.jsonDraft=''; markDirty(); rebuildEntities(); renderAll();
  }
  function resizeSelectedMap(){
    const ent=selectedMapEntity(); if (!ent) return; const map=ent.get();
    const w=Math.max(1, Math.floor(num($('mapWidth').value, map.width || rowWidth(map.tiles))));
    const h=Math.max(1, Math.floor(num($('mapHeight').value, map.height || (map.tiles||[]).length)));
    map.width=w; map.height=h; map.tiles = normalizeRows(map.tiles || [], w, h).map(r => r.replace(/T/g, state.selectedTile || 'T'));
    if (ent.type === 'world') state.data.mapData = map.tiles; else ent.set(map);
    state.jsonDraft=''; markDirty(); rebuildEntities(); renderAll();
  }
  function ensurePaintMode(){
    if (state.drawMode !== 'select') return;
    state.drawMode='paint';
    if ($('drawMode')) $('drawMode').value='paint';
  }
  function recommendedLibraryTheme(map){
    const key=String(getThemeKey(map)||'').toUpperCase();
    if (key.includes('VILLAGE') || key === 'START_VILLAGE') return 'village';
    if (key.includes('FOREST') || key.includes('WIND')) return 'forest';
    if (key.includes('FIRE') || key.includes('VOLCANO') || key.includes('IGNIS')) return 'volcanic';
    if (key.includes('WATER') || key.includes('SEABED') || key.includes('CRENA')) return 'water';
    if (key.includes('THUNDER')) return 'thunder';
    if (key.includes('LIGHT')) return 'light';
    if (key.includes('DARK') || key.includes('ABYSS')) return 'dark';
    if (key.includes('TOWER')) return 'tower';

  }
  function mapChipLibraryAssets(){
    const groups=(typeof PRISMA_MAP_CHIP_LIBRARY_GROUPS !== 'undefined') ? PRISMA_MAP_CHIP_LIBRARY_GROUPS : {};

    Object.entries(groups).forEach(([theme,slugs])=>(slugs||[]).forEach(slug=>{
      const key=`maplib_${theme}_${slug}`;
      out.push({key,theme,slug,role:decorationSlugs.has(slug)?'decoration':'blocking',src:assetPath(key)});
    }));
    return out;
  }
  function toolTab(key,label){ return `<button class="tool-tab ${state.editorTool===key?'active':''}" data-editor-tool="${key}">${label}</button>`; }
  function textileAssetChip(type,label,key){

    </div>`;
  }
  function tilePaletteHtml(map){
    const chars = new Set();
    (map.tiles || []).forEach(r => String(r).split('').forEach(c => chars.add(c)));
    const theme = getTheme(map);
    Object.keys(theme).forEach(k => chars.add(k));
    ['T','G','W','S','C','R','B','D','U','P','X','Y','Z','Q','N','O','I','K','E','H','V','M','L','F','l','d'].forEach(c => chars.add(c));
    return [...chars].filter(Boolean).sort().map(ch => {
      const cfg = tileVisualConfig(map, ch); const src = assetPath(cfg.img); const bg = cfg.color || '#24324a';
      return `<button class="tile-btn ${state.selectedTile===ch?'active':''}" data-tile="${esc(ch)}"><div class="tile-swatch" style="background-color:${esc(bg)};${src?`background-image:url('${esc(src)}')`:''}"><small>${esc(ch)}</small></div></button>`;
    }).join('');
  }
  function getTheme(map){
    const key = getThemeKey(map);
    const defaults=clone(state.data.tileThemes.DEFAULT||{});

    return {...defaults,...base,...(map.tileOverrides||{})};
  }
  function mergeOverlayMap(source, map){
    const isDungeon = !!map.isDungeon || selectedMapEntity()?.type === 'dungeon';
    const defaults = isDungeon ? (source.DEFAULT_DUNGEON || {}) : (source.DEFAULT_FIELD || {});
    const themeKey = getThemeKey(map);
    return {...defaults, ...(source[themeKey] || {}), ...(map.fixedTileOverlays || {}), ...(map.overlayOverrides || {})};
  }
  function overlayBaseSign(map, sign){
    const isDungeon = !!map.isDungeon || selectedMapEntity()?.type === 'dungeon';
    const source = state.data.fixedOverlayBaseTiles || {};
    const defaults = isDungeon ? (source.DEFAULT_DUNGEON || {}) : (source.DEFAULT_FIELD || {});
    const themeKey = getThemeKey(map);
    const merged = {...defaults, ...(source[themeKey] || {}), ...(map.fixedOverlayBaseTiles || {})};
    return merged[String(sign).toUpperCase()] || sign;
  }
  function tileVisualConfig(map, sign, x=null, y=null){
    const theme = getTheme(map); const upper=String(sign || '').toUpperCase();
    let overlay = mergeOverlayMap(state.data.fixedTileOverlays || {}, map)[upper];

    // ゲーム側 Field.getFixedTileOverlayConfig() と同じく、固定ボスのBタイルは
    // 汎用ボスアイコンではなく配置済み bossDef の monster_XXXX / overlay_boss_XXXX を優先する。
    if (overlay && upper === 'B' && x !== null && y !== null) {
      const bossKey = bossSpriteKeyFromDef(bossDefAt(map, x, y));
      if (bossKey) overlay = {...overlay, img: bossKey};

  function drawMap(){

    const ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=false; ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let y=0;y<h;y++){
      const row=String(rows[y] || '');
      for(let x=0;x<w;x++){
        const sign=row[x] || 'T'; const cfg=tileVisualConfig(map, sign, x, y); drawTile(ctx,cfg,x*tile,y*tile,tile,map,sign,x,y,ent?.type);
      }
    }
    if (state.showObjects) drawTileEffects(ctx,map,tile,w,h);
    if (state.showGrid && tile>=10) { ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1; for(let x=0;x<=w;x++){ctx.beginPath();ctx.moveTo(x*tile+.5,0);ctx.lineTo(x*tile+.5,h*tile);ctx.stroke();} for(let y=0;y<=h;y++){ctx.beginPath();ctx.moveTo(0,y*tile+.5);ctx.lineTo(w*tile,y*tile+.5);ctx.stroke();} }
    if (state.showObjects) drawObjects(ctx,map,tile,ent?.type);
    ctx.strokeStyle='#f5bd4f'; ctx.lineWidth=Math.max(2,Math.floor(tile/8)); ctx.strokeRect(state.selectedCoord.x*tile+1,state.selectedCoord.y*tile+1,tile-2,tile-2);

  function drawTile(ctx,cfg,px,py,tile,map,sign,x,y,entityType){
    const upper=String(sign||'T').toUpperCase();
    const overlay=cfg.overlay||null;
    const theme=getTheme(map);
    const baseSign=overlay ? overlayBaseSign(map,upper) : (upper==='G'?'G':'T');
    const floorCfg=renderShared.resolveTileVariant(theme[baseSign]||theme.T||cfg||{img:'',color:'#202a3e'},x,y);
    drawEditorImageOrColor(ctx,floorCfg.img,floorCfg.color,px,py,tile,tile);

    const fixed=drawEditorFixedDecorations(ctx,map,x,y,px,py,tile);
    if(entityType==='world' && ['F','L'].includes(upper)) drawEditorWorldDecoration(ctx,map,x,y,upper,px,py,tile,'under');
    if(!fixed && !overlay && ['T','G'].includes(upper) && !hasApplicableFloorEffect(map,x,y)){
      if(entityType==='world') drawEditorWorldDecoration(ctx,map,x,y,upper,px,py,tile,'over');
      else drawEditorRandomDecoration(ctx,map,x,y,px,py,tile);
    }

    if(!overlay && !['T','G'].includes(upper)){
      const face=wallFaceKeyForEditor(map,x,y,upper,entityType);
      const mode=wallFaceModeForEditor(map,entityType);
      const objectKey=face&&mode!=='overlay'?face:cfg.img;
      const height=upper==='W'&&entityType==='dungeon'?Math.round(tile*1.5):tile;
      drawEditorImageOrColor(ctx,objectKey,cfg.color,px,py+tile-height,tile,height);
      if(face&&mode==='overlay') drawEditorImageOrColor(ctx,face,'',px,py+tile-height,tile,height);
    }
    if(entityType==='world'&&upper==='W') drawEditorWorldDecoration(ctx,map,x,y,upper,px,py,tile,'over');
    if(overlay) drawOverlayImage(ctx,overlay,px,py,tile,!!map.isWorld||entityType==='world');

    if(!assetPath(cfg.img)&&!overlay&&tile>=14){
      ctx.fillStyle='rgba(255,255,255,.22)';ctx.font=`${Math.floor(tile*.55)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sign,px+tile/2,py+tile/2);
    }
  }

  function editHazardAt(x,y,type,commit=true){
    const ent=selectedMapEntity(); if(!ent || ent.type==='world') return;
    const map=ent.get(), w=map.width||rowWidth(map.tiles), h=map.height||(map.tiles||[]).length;
    if(!Array.isArray(map.tileEffects)) map.tileEffects=[];
    const hazardTypes=type==='erase'?['ice','poison']:[type];
    hazardTypes.forEach(hazard=>{
      const effects=map.tileEffects.filter(e=>String(e.type||'').toLowerCase()===hazard);
      if(type==='erase'){
        effects.forEach(effect=>{
          if(effect.editorManaged){ effect.points=(effect.points||[]).filter(p=>Number(p.x)!==x||Number(p.y)!==y); }
          else if(effectContainsRawCell(effect,x,y,w,h) && !pointListHas(effect.excludePoints,x,y)){ if(!Array.isArray(effect.excludePoints)) effect.excludePoints=[]; effect.excludePoints.push({x,y}); }
        });
      }else{
        if(isCellReserved(map,x,y)) return;
        const conflicting=(map.tileEffects||[]).some(other=>['ice','poison'].includes(String(other.type||'').toLowerCase())&&String(other.type||'').toLowerCase()!==hazard&&effectContainsRawCell(other,x,y,w,h)&&!pointListHas(other.excludePoints,x,y));
        if(conflicting) return;
        let covered=false;
        effects.forEach(effect=>{
          if(effectContainsRawCell(effect,x,y,w,h)){
            covered=true;
            if(Array.isArray(effect.excludePoints)) effect.excludePoints=effect.excludePoints.filter(p=>Number(p.x)!==x||Number(p.y)!==y);
          }
        });
        if(!covered){
          let managed=effects.find(e=>e.editorManaged===true);
          if(!managed){ managed={type:hazard,onlyWalkable:true,editorManaged:true,points:[]}; map.tileEffects.push(managed); }
          if(!pointListHas(managed.points,x,y)) managed.points.push({x,y});
        }
      }
    });
    map.tileEffects=map.tileEffects.filter(e=>!(e.editorManaged&&Array.isArray(e.points)&&e.points.length===0));
    setSelectedMap(map); if(commit){state.jsonDraft='';markDirty();}
  }
  function removePlacementAt(x,y,kind='all',rerender=true){
    const ent=selectedMapEntity(); if(!ent || ent.type==='world') return;
    const map=ent.get(); let removed=0;
    if(kind==='all'||kind==='textile'||kind==='prop'){
      const before=(map.floorDecorations||[]).length;
      const removedAuthoredIds=(map.floorDecorations||[]).filter(d=>x>=Number(d.x)&&x<Number(d.x)+Math.max(1,Number(d.width||1))&&y>=Number(d.y)&&y<Number(d.y)+Math.max(1,Number(d.height||1))).map(d=>d.authoredPlacementId).filter(Boolean);
      if(removedAuthoredIds.length) state.data.authoredMapPropPlacements=(state.data.authoredMapPropPlacements||[]).filter(p=>!removedAuthoredIds.includes(p.id));
      map.floorDecorations=(map.floorDecorations||[]).filter(d=>!(x>=Number(d.x)&&x<Number(d.x)+Math.max(1,Number(d.width||1))&&y>=Number(d.y)&&y<Number(d.y)+Math.max(1,Number(d.height||1))));
      removed+=before-map.floorDecorations.length;
    }
    if(kind==='all'||kind==='prop'){
      const before=(map.blockingObjects||[]).length;
      const removedAuthoredIds=(map.blockingObjects||[]).filter(o=>Number(o.x)===x&&Number(o.y)===y).map(o=>o.authoredPlacementId).filter(Boolean);
      if(removedAuthoredIds.length) state.data.authoredMapPropPlacements=(state.data.authoredMapPropPlacements||[]).filter(p=>!removedAuthoredIds.includes(p.id));
      map.blockingObjects=(map.blockingObjects||[]).filter(o=>!(Number(o.x)===x&&Number(o.y)===y)); removed+=before-map.blockingObjects.length;
    }
    setSelectedMap(map); state.jsonDraft=''; if(removed) markDirty(); if(rerender) syncCanvasEdit();
  }
  function clearManagedHazard(type){
    const ent=selectedMapEntity(); if(!ent||ent.type==='world') return; const map=ent.get();
    map.tileEffects=(map.tileEffects||[]).filter(e=>!(e.editorManaged&&String(e.type||'').toLowerCase()===String(type||'').toLowerCase()));
    setSelectedMap(map); state.jsonDraft=''; markDirty(); renderAll();
  }
  function updateCoordInfo(){
    const map=selectedMap(); const {x,y}=state.selectedCoord; const tile=(map.tiles?.[y]||'')[x] || '';
    const objs=[]; ['chests','bosses','floorLinks','mapActions','tileEffects','healSprings','floorDecorations','blockingObjects'].forEach(list => (map[list]||[]).forEach((o,i)=>{const covers=list==='floorDecorations'?x>=Number(o.x)&&x<Number(o.x)+Math.max(1,Number(o.width||1))&&y>=Number(o.y)&&y<Number(o.y)+Math.max(1,Number(o.height||1)):Number(o.x)===x&&Number(o.y)===y;if(covers) objs.push(`${list}#${i}: ${labelForObject(list,o)}`);}));
    $('coordInfo').innerHTML = `<b>座標</b> <span class="kbd">x:${x}, y:${y}</span> / tile <span class="kbd">${esc(tile)}</span><br>${objs.length?objs.map(esc).join('<br>'):'<span class="hint">クリックで座標選択。ペンモードならタイルを塗れます。</span>'}`;
  }

  function firstItemId(){ return state.data.items[0]?.id || 1; }
  function firstMonsterId(){ return state.data.monsters[0]?.id || 100001; }
  function firstScriptId(){ return state.scripts[0] || ''; }
  function firstEventId(){ return state.events[0] || ''; }
  function itemLabel(id){ const it=state.data.items.find(i=>Number(i.id)===Number(id)); return it ? `[${it.id}] ${it.name}` : `[${id ?? '?'}] 未登録アイテム`; }
  function monsterLabel(id){ const ids=Array.isArray(id)?id:[id]; return ids.map(one=>{ const m=state.data.monsters.find(x=>Number(x.id)===Number(one)); return m ? `[${m.id}] ${m.name}` : `[${one ?? '?'}] 未登録モンスター`; }).join(', '); }

  function runValidation(update=true){
    const out=[]; const itemIds=new Set(state.data.items.map(i=>Number(i.id))); const monsterIds=new Set(state.data.monsters.map(m=>Number(m.id))); const scriptIds=new Set(Object.keys(state.data.storyManagerData.scripts||{})); const eventIds=new Set(Object.keys(state.data.storyManagerData.events||{})); const dungeonIds=new Set(Object.keys(state.data.fixedDungeonMaps||{})); const mutationIds=new Set(Object.keys(state.data.storyMapMutations||{})); const assetIds=new Set(Object.keys(state.data.graphics||{}));
    const add=(level,where,message)=>out.push({level,where,message});
    state.maps.forEach(ent=>{ const m=ent.get(); const rows=m.tiles || []; const w=m.width || rowWidth(rows); const h=m.height || rows.length; if(rows.length!==h) add('error',ent.name,`height ${h} と tiles行数 ${rows.length} が一致しません`); rows.forEach((r,y)=>{ if(String(r).length!==w) add('error',`${ent.name} y=${y}`,`width ${w} と行長 ${String(r).length} が一致しません`); }); const theme=getTheme(m); rows.forEach((r,y)=>String(r).split('').forEach((ch,x)=>{ const upper=String(ch).toUpperCase(); const has=theme[ch]||theme[upper]||mergeOverlayMap(state.data.fixedTileOverlays||{},m)[upper]; if(!has) add('warn',`${ent.name} (${x},${y})`,`未定義タイル '${ch}'`); })); const checkCoord=(o,list,i)=>{ if(!Number.isInteger(Number(o.x))||!Number.isInteger(Number(o.y))||Number(o.x)<0||Number(o.y)<0||Number(o.x)>=w||Number(o.y)>=h) add('error',`${ent.name} ${list}#${i}`,`座標が範囲外です x=${o.x}, y=${o.y}`); };
      (m.chests||[]).forEach((c,i)=>{ checkCoord(c,'chests',i); if(c.trapMonsterId!==undefined&&c.trapMonsterId!==null){const monster=state.data.monsters.find(entry=>Number(entry.id)===Number(c.trapMonsterId));if(!monster)add('error',`${ent.name} chests#${i}`,`trapMonsterId ${c.trapMonsterId} が monsters.js / chest-mimics.js にありません`);else if(!monster.isChestTrap)add('error',`${ent.name} chests#${i}`,`monsterId ${c.trapMonsterId} は宝箱トラップではありません`);}else if(c.itemId!==undefined&&c.itemId!==null&&!itemIds.has(Number(c.itemId)))add('error',`${ent.name} chests#${i}`,`itemId ${c.itemId} が items.js にありません`); });
      (m.bosses||[]).forEach((b,i)=>{ checkCoord(b,'bosses',i); const ids=Array.isArray(b.monsterIds)?b.monsterIds:(Array.isArray(b.monsterId)?b.monsterId:[b.monsterId]); ids.filter(v=>v!==undefined).forEach(mid=>{ if(!monsterIds.has(Number(mid))) add('error',`${ent.name} bosses#${i}`,`monsterId ${mid} が monsters.js にありません`); }); if(b.storyEventId && !eventIds.has(b.storyEventId)) add('warn',`${ent.name} bosses#${i}`,`storyEventId ${b.storyEventId} が StoryManager.events にありません`); });
      (m.floorLinks||[]).forEach((f,i)=>checkCoord(f,'floorLinks',i));
      (m.tileEffects||[]).forEach((f,i)=>{if(Number.isFinite(Number(f.x))&&Number.isFinite(Number(f.y)))checkCoord(f,'tileEffects',i);const cells=tileEffectCells(f,w,h);if(!cells.length)add('warn',`${ent.name} tileEffects#${i}`,'効果範囲が空です');});
      (m.healSprings||[]).forEach((f,i)=>checkCoord(f,'healSprings',i));
      (m.mapActions||[]).forEach((a,i)=>{ checkCoord(a,'mapActions',i); if(a.eventId && !eventIds.has(a.eventId)) add('warn',`${ent.name} mapActions#${i}`,`eventId ${a.eventId} が StoryManager.events にありません`); if(a.imageKey && !assetIds.has(a.imageKey)) add('warn',`${ent.name} mapActions#${i}`,`imageKey ${a.imageKey} が PRISMA_ASSETS.graphics にありません`); });
      (m.floorDecorations||[]).forEach((d,i)=>{checkCoord(d,'floorDecorations',i);const dw=Math.max(1,Number(d.width||1)),dh=Math.max(1,Number(d.height||1));if(Number(d.x)+dw>w||Number(d.y)+dh>h)add('error',`${ent.name} floorDecorations#${i}`,'敷物・装飾の範囲がマップ外へ出ています');if(d.imageKey&&!assetIds.has(d.imageKey))add('error',`${ent.name} floorDecorations#${i}`,`imageKey ${d.imageKey} が PRISMA_ASSETS.graphics にありません`);if(!d.imageKey&&!TEXTILE_EDITOR_STYLES[d.type])add('warn',`${ent.name} floorDecorations#${i}`,`未対応の装飾 type ${d.type}`);});
      (m.blockingObjects||[]).forEach((o,i)=>{checkCoord(o,'blockingObjects',i);if(o.imageKey&&!assetIds.has(o.imageKey))add('error',`${ent.name} blockingObjects#${i}`,`imageKey ${o.imageKey} が PRISMA_ASSETS.graphics にありません`);const sign=String(rows?.[Number(o.y)]||'')[Number(o.x)]?.toUpperCase();if(sign&&!['T','G'].includes(sign))add('warn',`${ent.name} blockingObjects#${i}`,`通行不能小物が通常床以外の ${sign} 上にあります`);});
    });
    (state.data.fieldEncounterZones||[]).forEach((z,i)=>{ (z.monsters||[]).forEach(mid=>{ if(!monsterIds.has(Number(mid))) add('error',`FIELD_ENCOUNTER_ZONES#${i}`,`monster ${mid} が monsters.js にありません`); }); (z.rareMonsters||[]).forEach((r,j)=>{ if(!monsterIds.has(Number(r.id))) add('error',`FIELD_ENCOUNTER_ZONES#${i}.rare#${j}`,`monster ${r.id} が monsters.js にありません`); if(Number(r.rate)<0||Number(r.rate)>1) add('warn',`FIELD_ENCOUNTER_ZONES#${i}.rare#${j}`,`rate ${r.rate} は0〜1推奨です`); }); });
    Object.entries(state.data.storyManagerData.events||{}).forEach(([id,ev])=>{ ['actions','winActions'].forEach(phase=>{ (ev[phase]||[]).forEach((a,i)=>validateAction(a,`${id}.${phase}#${i}`)); }); });
    Object.entries(state.data.storyManagerData.scripts||{}).forEach(([id,arr])=>{ if(!Array.isArray(arr)) add('error',`scripts.${id}`,'会話スクリプトは配列である必要があります'); else arr.forEach((line,i)=>{ const text=String(line.text||''); [...text.matchAll(/\[N:(\d+)\]/g)].forEach(m=>{ const cid=Number(m[1]); if(!state.data.chars.find(c=>Number(c.id)===cid || Number(c.uid)===cid)) add('warn',`scripts.${id}#${i}`,`[N:${cid}] に対応するキャラクターが見つかりません`); }); }); });
    function validateAction(a,where){ if(!a || typeof a!=='object') return add('error',where,'actionがオブジェクトではありません'); if(!a.type) add('error',where,'typeがありません'); if(a.type==='CONV' && !scriptIds.has(a.value)) add('error',where,`CONV value ${a.value} が scripts にありません`); if(a.type==='EVENT' && !eventIds.has(a.value)) add('error',where,`EVENT value ${a.value} が events にありません`); if(a.type==='BOSS'){ const ids=Array.isArray(a.value)?a.value:[a.value]; ids.filter(v=>v!==undefined&&v!==null).forEach(mid=>{ if(!monsterIds.has(Number(mid))) add('error',where,`BOSS ${mid} が monsters.js にありません`); }); } if(a.type==='ITEM'){ const iid=Number(a.id ?? a.value); if(!itemIds.has(iid)) add('error',where,`ITEM ${iid} が items.js にありません`); } if(a.type==='START_FIXED_DUNGEON' && !dungeonIds.has(a.value)) add('error',where,`START_FIXED_DUNGEON ${a.value} がありません`); if(a.type==='MAP_CHANGE' && !mutationIds.has(a.value || a.key)) add('warn',where,`MAP_CHANGE ${a.value || a.key} が STORY_MAP_MUTATIONS にありません`); if((a.type==='IF_FLAG'||a.type==='IF') && Array.isArray(a.then)) a.then.forEach((sub,i)=>validateAction(sub,`${where}.then#${i}`)); if((a.type==='IF_FLAG'||a.type==='IF') && Array.isArray(a.else)) a.else.forEach((sub,i)=>validateAction(sub,`${where}.else#${i}`)); if(a.type==='CHOICE'){ (a.yes||[]).forEach((sub,i)=>validateAction(sub,`${where}.yes#${i}`)); (a.no||[]).forEach((sub,i)=>validateAction(sub,`${where}.no#${i}`)); } }
    if(update) state.validation=out; return out;
  }

  function jsLiteral(v){ return JSON.stringify(v, null, 4).replace(/"([^"\\]*(?:\\.[^"\\]*)*)"\s*:/g, (m,k) => /^[A-Za-z_$][\w$]*$/.test(k) ? k+':' : m); }
  function generateMapJs(){
    return `/* map.js - generated by map_story_editor.html. Runtime logic is in maps_logic.js. */\nconst tileEntry = (img, color, options = {}) => ({ img, color, ...options });\n\nconst STORY_MAP_MUTATIONS = ${jsLiteral(state.data.storyMapMutations)};\n\nconst TILE_THEMES = ${jsLiteral(state.data.tileThemes)};\n\nconst DUNGEON_WALL_FACE_THEMES = ${jsLiteral(state.data.dungeonWallFaceThemes)};\n\nconst MAP_FLOOR_DECOR_THEMES = ${jsLiteral(state.data.mapFloorDecorThemes)};\n\nconst STORY_DATA = ${jsLiteral(state.data.storyData)};\n\nconst SEA_ENCOUNTER_MONSTERS = ${jsLiteral(state.data.seaEncounterMonsters)};\n\nconst FIELD_ENCOUNTER_ZONES = ${jsLiteral(state.data.fieldEncounterZones)};\n\nconst WORLD_BRIDGES = ${jsLiteral(state.data.worldBridges)};\n\nconst MAP_DATA = ${jsLiteral(state.data.mapData)};\n\nconst FIXED_TILE_OVERLAYS = ${jsLiteral(state.data.fixedTileOverlays)};\n\nconst FIXED_OVERLAY_BASE_TILES = ${jsLiteral(state.data.fixedOverlayBaseTiles)};\n\nconst FIXED_MAPS = ${jsLiteral(state.data.fixedMaps)};\n\nconst FIXED_DUNGEON_MAPS = ${jsLiteral(state.data.fixedDungeonMaps)};\n\nconst AUTHORED_MAP_PROP_PLACEMENTS = ${jsLiteral(state.data.authoredMapPropPlacements)};\n\nif (typeof window !== "undefined") {\n    window.STORY_MAP_MUTATIONS = STORY_MAP_MUTATIONS;\n    window.TILE_THEMES = TILE_THEMES;\n    window.DUNGEON_WALL_FACE_THEMES = DUNGEON_WALL_FACE_THEMES;\n    window.MAP_FLOOR_DECOR_THEMES = MAP_FLOOR_DECOR_THEMES;\n    window.STORY_DATA = STORY_DATA;\n    window.SEA_ENCOUNTER_MONSTERS = SEA_ENCOUNTER_MONSTERS;\n    window.FIELD_ENCOUNTER_ZONES = FIELD_ENCOUNTER_ZONES;\n    window.WORLD_BRIDGES = WORLD_BRIDGES;\n    window.MAP_DATA = MAP_DATA;\n    window.FIXED_TILE_OVERLAYS = FIXED_TILE_OVERLAYS;\n    window.FIXED_OVERLAY_BASE_TILES = FIXED_OVERLAY_BASE_TILES;\n    window.FIXED_MAPS = FIXED_MAPS;\n    window.FIXED_DUNGEON_MAPS = FIXED_DUNGEON_MAPS;\n    window.AUTHORED_MAP_PROP_PLACEMENTS = AUTHORED_MAP_PROP_PLACEMENTS;\n}\n`;
  }
  function generateStoryJs(){
    const d = state.data.storyManagerData;
    const out = { maxMainStoryProgress:d.maxMainStoryProgress || {storyStep:0,subStep:0}, storyObjectives:d.storyObjectives || {}, dungeonObjectiveMilestones:d.dungeonObjectiveMilestones || [], scripts:d.scripts || {}, events:d.events || {} };
    return `/* story.js - generated by map_story_editor.html. Runtime logic is in story_logic.js. */\nconst STORY_MANAGER_DATA = ${jsLiteral(out)};\n\nif (typeof window !== "undefined") {\n    window.STORY_MANAGER_DATA = STORY_MANAGER_DATA;\n}\n`;
  }
  function downloadText(filename,text){ const blob=new Blob([text],{type:'text/javascript;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},500); state.dirty=false; }
  async function copyText(text){ try{ await navigator.clipboard.writeText(text); alert('クリップボードへコピーしました'); }catch(e){ alert('コピーできませんでした。出力欄から手動コピーしてください。'); } }

  init();
})();
