<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISMA ABYSS - Title</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
    <link rel="manifest" href="manifest.json">

    <script>
    // main.html の既存の <script> ブロック内を以下のように更新
	if ('serviceWorker' in navigator) {
		navigator.serviceWorker.register('sw.js').then(reg => {
			// 更新が見つかった場合のリスナー
			reg.onupdatefound = () => {
				const installingWorker = reg.installing;
				installingWorker.onstatechange = () => {
					// 新しいSWがインストール完了（待機状態）になり、かつ既に制御しているSWがある場合
					if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
						showUpdatePrompt();
					}
				};
			};
		});
	}

	/**
	 * 更新通知ポップアップを表示する
	 */
	function showUpdatePrompt() {
		const updateDate = "2026/05/11"; // 配信日を手動で更新する箇所
		const changeLog = "主な変更点：実績機能の追加およびバグ修正"; // 任意文章
		
		const message = `${updateDate}付で最新バージョンが配信されています。\n` +
						`アプリケーションを最新状態に更新してよろしいですか？\n\n` +
						`${changeLog}`;

		if (confirm(message)) {
			// 「はい」の場合、既存の更新処理を実行
			forceUpdateApp();
		}
		// 「いいえ」の場合はそのまま（何もしない）
	}

	/**
	 * 既存のupdateAppをベースにした強制更新処理
	 */
	function forceUpdateApp() {
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.getRegistrations().then(regs => {
				regs.forEach(reg => reg.unregister());
				caches.keys().then(keys => {
					keys.forEach(key => caches.delete(key));
				});
			}).then(() => {
				location.reload(true);
			});
		} else {
			location.reload(true);
		}
	}
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        :root {
            --bg-color: #101010;
            --text-color: #fff;
            --accent: #ffd700;
            --btn-bg: #333;
            --btn-border: #fff;
            --danger: #ff4444;
            --modal-bg: rgba(0, 0, 0, 0.9);
        }
        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'DotGothic16', sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
            overflow-y: auto;
            user-select: none;
        }

        /* 既存デザインの維持 */
        .title-logo { text-align: center; margin-bottom: 15px; width: 100%; max-width: 400px; }
        .title-logo img { max-width: 80%; height: auto; }

        .input-group { width: 280px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        input[type="text"] { 
            background: #222; border: 1px solid #666; color: #fff; padding: 10px; 
            font-family: inherit; text-align: center; border-radius: 4px; 
        }
        .file-input-wrapper { font-size: 12px; color: #aaa; text-align: center; }
        .file-input-wrapper label { display: block; margin-bottom: 5px; }

        .btn-container { display: flex; flex-direction: column; gap: 12px; width: 280px; margin-bottom: 30px; }
        .btn {
            background: var(--btn-bg); border: 2px solid var(--btn-border); color: var(--text-color);
            padding: 12px; font-family: 'DotGothic16', sans-serif; font-size: 18px;
            cursor: pointer; transition: all 0.2s; text-align: center; border-radius: 4px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: default; }

        /* モーダル専用スタイル */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        #modal-content {
            background: #1a1a1a; border: 2px solid var(--accent); padding: 20px;
            width: 300px; display: flex; flex-direction: column; gap: 12px; border-radius: 8px;
        }
        .modal-title { text-align: center; font-size: 18px; margin-bottom: 5px; color: var(--accent); }
        .btn-modal { font-size: 14px; padding: 10px; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-close { margin-top: 5px; background: #333; border-color: #666; font-size: 12px; }
        hr { width: 100%; border: 0; border-top: 1px solid #444; margin: 5px 0; }
    </style>
    <link rel="stylesheet" href="modern-polish.css">
</head>
<body>

    <div class="title-logo">
        <img src="assets/background/PRISMA ABYSS.png" alt="PRISMA ABYSS">
    </div>

    <div class="input-group">
        <input type="text" id="player-name" placeholder="名前を入力" value="アルス" maxlength="8">
        <div class="file-input-wrapper">
            <label>主人公アイコン (任意)</label>
            <input type="file" id="player-icon" accept="image/*">
        </div>
    </div>

    <div class="btn-container">
        <button class="btn btn-new" onclick="startGameConfirm()">はじめから</button>
        <button class="btn btn-load" id="btn-continue" onclick="App.continueGame()" disabled>つづきから</button>
        <hr>
        <button class="btn" onclick="toggleModal(true)">データ管理</button>
    </div>

    <div id="modal-overlay" onclick="if(event.target === this) toggleModal(false)">
        <div id="modal-content">
            <div class="modal-title">データ管理</div>
            
            <button class="btn btn-modal" onclick="App.importSave()">バックアップから復元</button>
            <hr>
            <button id="installBtn" class="btn btn-modal" style="display:none;">アプリをインストール</button>
            <button id="updateBtn" class="btn btn-modal" onclick="updateApp()">アプリを更新</button>
            <hr>
            <button id="deleteBtn" class="btn btn-modal btn-danger" onclick="deleteSaveData()">セーブデータを削除</button>
            
            <button class="btn btn-close" onclick="toggleModal(false)">戻る</button>
        </div>
    </div>
    <!-- タイトル画面で必要な最小限の読み込み -->
    <script src="equips.js"></script>
    <script src="database.js"></script>
    <script src="main.js"></script>
    <script>
        // 起動時処理（既存維持 + 内部ロジック通り）
        window.onload = () => {
            if(typeof App !== 'undefined' && App.initTitleScreen) {
                App.initTitleScreen();
                if(App.data) {
                    const btn = document.getElementById('btn-continue');
                    btn.disabled = false;
                    let name = '勇者';
                    let lv = 1;
                    if(App.data.party && App.data.party[0]) {
                        const char = App.data.characters.find(c => c.uid === App.data.party[0]);
                        if(char) {
                            name = char.name;
                            lv = char.level;
                        }
                    }
                    btn.innerHTML = `続きから<br><span style="font-size:12px">(${name} Lv.${lv})</span>`;
                }
            } else {
                console.error('App module failed to load.');
            }
        };

        // 「はじめから」の警告処理
        function startGameConfirm() {
            if (typeof App !== 'undefined' && App.data) {
                if (!confirm('プレイ済みのデータがある場合はデータが消えてしまいますが、よろしいですか？')) {
                    return;
                }
            }
            App.startNewGame();
        }

        // モーダル開閉
        function toggleModal(show) {
            document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none';
        }

        // データ削除（既存維持）
        function deleteSaveData() {
            if(typeof CONST === 'undefined' || !CONST.SAVE_KEY) {
                alert('データベースエラー: CONSTが読み込まれていません');
                return;
            }
            if(confirm('本当にセーブデータを削除しますか？\n失われたデータは復元できません。')) {
                localStorage.removeItem(CONST.SAVE_KEY);
                location.reload();
            }
        }
        
        // PWAインストール機能（既存維持）
        let deferredPrompt;
        window.addEventListener("beforeinstallprompt", (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById("installBtn").style.display = "block";
        });

        document.getElementById("installBtn").addEventListener("click", async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById("installBtn").style.display = "none";
            }
            deferredPrompt = null;
        });

        // アプリ更新（既存維持）
        function updateApp() {
            if (confirm('アプリのキャッシュをクリアして最新版に更新しますか？')) {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(regs => {
                        regs.forEach(reg => reg.unregister());
                        caches.keys().then(keys => {
                            keys.forEach(key => caches.delete(key));
                        });
                    }).then(() => {
                        location.reload(true);
                    });
                } else {
                    location.reload(true);
                }
            }
        }
    </script>
</body>
</html>
