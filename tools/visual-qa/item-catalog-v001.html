<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Item Catalog Visual QA</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui,"Noto Sans JP",sans-serif; }
    body { margin:0; background:#120b06; color:#f8e7c4; }
    main { width:min(920px,calc(100% - 28px)); margin:28px auto; }
    h1 { color:#ffd56a; font-size:22px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
    .card { background:linear-gradient(#352111,#211208); border:1px solid #7d5528; border-radius:12px; padding:14px; }
    .head { display:flex; align-items:center; gap:12px; }
    img { width:64px; height:64px; image-rendering:pixelated; background:#102016; border:1px solid #82642f; border-radius:8px; }
    strong { color:#ffd56a; }
    p,li { color:#d2b98e; font-size:12px; line-height:1.6; }
    ul { margin:10px 0 0; padding-left:20px; }
  </style>
  <script src="../../items.js"></script>
  <script src="../../item-expansion.js"></script>
</head>
<body>
<main>
  <h1>道具カテゴリ・64px表示検証</h1>
  <div id="grid" class="grid"></div>
</main>
<script>
  const groups = [
    { label:'攻撃道具', icon:'attack', filter:i=>i.type==='攻撃道具' },
    { label:'強化道具', icon:'buff', filter:i=>i.type==='強化道具' },
    { label:'弱体道具', icon:'debuff', filter:i=>i.type==='弱体道具' },
    { label:'素材（共用）', icon:'material', filter:i=>i.type==='素材', note:'新規64件＋既存素材' }
  ];
  const grid = document.getElementById('grid');
  groups.forEach(group => {
    const entries = window.ITEMS_DATA.filter(group.filter);
    const card = document.createElement('section');
    card.className = 'card';
    card.innerHTML = `<div class="head"><img src="../../assets/ui/menu-icons/item-${group.icon}-v001.png" alt="${group.label}"><div><strong>${group.label}</strong><p>${group.note || `${entries.length}件`}</p></div></div><ul>${entries.slice(0,5).map(item=>`<li>${item.name}</li>`).join('')}</ul>`;
    grid.appendChild(card);
  });
</script>
</body>
</html>
