  const DEFAULT_LOW_FLOOR_OFFSETS = {"1": [{"hpMp": 1, "other": 1, "reward": 1}, {"hpMp": 1.8, "other": 1.2, "reward": 1.25}, {"hpMp": 2.9, "other": 1.4, "reward": 1.45}, {"hpMp": 4.3, "other": 1.65, "reward": 1.7}, {"hpMp": 6.3, "other": 2, "reward": 2}], "6": [{"hpMp": 1, "other": 1, "reward": 1}, {"hpMp": 1.15, "other": 1.06, "reward": 1.08}, {"hpMp": 1.3, "other": 1.12, "reward": 1.14}, {"hpMp": 1.45, "other": 1.18, "reward": 1.2}, {"hpMp": 1.6, "other": 1.24, "reward": 1.26}]};
  const DEFAULT_STANDARD_FLOOR_OFFSETS = [{"hpMp": 1, "other": 1, "reward": 1}, {"hpMp": 1.05, "other": 1.04, "reward": 1}, {"hpMp": 1.1, "other": 1.08, "reward": 1}, {"hpMp": 1.15, "other": 1.12, "reward": 1}, {"hpMp": 1.2, "other": 1.16, "reward": 1}];

  const state = {
    monsters: [], skills: [], items: [], passives: [], skillMap: new Map(), itemMap: new Map(), passiveMap: new Map(),

  const $ = (id) => document.getElementById(id);

  const toNumberOrNull = (v) => v === "" || v === null || v === undefined ? null : Number(v);

  }

  function normalizeAct(a){
    if (typeof a === "number") return { id: a, rate: 10, condition: 0 };
    if (!a || typeof a !== "object") return { id: 1, rate: 10, condition: 0 };
    return { ...clone(a), id: toNumberOrNull(a.id), rate: Number(a.rate ?? 10), condition: Number(a.condition ?? 0) };

  function normalizeDrops(drops, oldDrop){
    const d = clone(drops || {});

    d.rare.id = d.rare.id === undefined ? null : d.rare.id;

  function normalizeTraits(list){
    if (!Array.isArray(list)) return [];

      if (typeof t === "number") return { id: t, level: 1 };
      if (typeof t === "string") return { id: null, level: 1, custom: t };

  function inferBand(minF){

  function normalizeMonster(source, meta = {}){
    const m = clone(source || {});
    m._uid = uid();

    delete m.drop;
    m.elmRes = m.elmRes && typeof m.elmRes === "object" ? clone(m.elmRes) : {};

  }

  function cleanMonster(m){
    const out = clone(m);
    delete out._uid; delete out._sourceGroup; delete out._bandStart; delete out._bandEnd; delete out._offsetType;
    out.acts = (out.acts || []).map((a) => ({ ...clone(a), id: a.id === null ? null : Number(a.id), rate: Number(a.rate ?? 0), condition: Number(a.condition ?? 0) }));
    out.drops = normalizeDrops(out.drops);
    out.traits = (out.traits || []).map((t) => {
      if (t.id === null || t.id === undefined || t.id === "") return t.custom ? String(t.custom) : { id: null, level: Number(t.level ?? 1) };
      const copy = clone(t); copy.id = Number(copy.id); copy.level = Number(copy.level ?? 1); delete copy.custom; return copy;
    }).filter((t) => !(typeof t === "object" && t.id === null && !t.custom));
    for (const key of Object.keys(out.elmRes || {})) {
      const n = Number(out.elmRes[key]);
      if (out.elmRes[key] === "" || out.elmRes[key] === null || Number.isNaN(n)) delete out.elmRes[key]; else out.elmRes[key] = n;
    }
    for (const key of Object.keys(out.resists || {})) {
      const n = Number(out.resists[key]);
      if (out.resists[key] === "" || out.resists[key] === null || Number.isNaN(n)) delete out.resists[key]; else out.resists[key] = n;
    }
    return out;
  }

  function initData(){
    const md = window.MonsterData || {};
    state.source.races = clone(md.races || DEFAULT_MONSTER_RACES);

  function buildModel(){
    const bandsMap = new Map();

    const sourceMonsters = state.monsters.slice().sort((a,b) => Number(a.id)-Number(b.id));
    for (const m of sourceMonsters) {
      const group = effectiveGroup(m);
      if (group === "special") special.push(m);
      else if (group === "boss") boss.push(m);
      else if (group === "rare") rare.push(m);
      else {
        const inferred = inferBand(m.minF);
        const start = Number(m._bandStart || inferred.start);
        const end = Number(m._bandEnd || inferred.end);
        const offsetType = m._offsetType || inferred.offsetType || "";
        const key = `${start}:${end}:${offsetType}`;
        if (!bandsMap.has(key)) bandsMap.set(key, { bandStart: start, bandEnd: end, offsetType, monsters: [] });
        bandsMap.get(key).monsters.push(m);
      }
    }
    const bands = Array.from(bandsMap.values()).sort((a,b) => a.bandStart - b.bandStart || a.bandEnd - b.bandEnd);
    bands.forEach((b) => b.monsters.sort((a,c) => Number(a.id)-Number(c.id)));

  function csvEscape(value){
    const s = value === null || value === undefined ? "" : String(value);

  function parseCsv(text){
    const rows = [];
    let row = [], cur = "", inQuote = false;
    const src = String(text || "").replace(/^\uFEFF/, "");
    for (let i = 0; i < src.length; i++) {
      const c = src[i];
      if (inQuote) {
        if (c === '"' && src[i + 1] === '"') { cur += '"'; i++; }
        else if (c === '"') inQuote = false;
        else cur += c;
      } else {
        if (c === '"') inQuote = true;
        else if (c === ',') { row.push(cur); cur = ""; }
        else if (c === '\n' || c === '\r') {
          row.push(cur); cur = "";
          if (row.some((v) => v !== "")) rows.push(row);
          row = [];
          if (c === '\r' && src[i + 1] === '\n') i++;
        } else cur += c;
      }
    }
    row.push(cur);
    if (row.some((v) => v !== "")) rows.push(row);
    return rows;
  }

      out.dropRareRate = m.drops?.rare?.rate ?? 0;
      elmKeys.forEach((k) => out[`elmRes_${k}`] = (m.elmRes && m.elmRes[k] !== undefined) ? m.elmRes[k] : "");
      resistKeys.forEach((k) => out[`resist_${k}`] = (m.resists && m.resists[k] !== undefined) ? m.resists[k] : "");
      for (let i = 1; i <= traitSlots; i++) {
        const tr = (m.traits || [])[i - 1] || {};
        out[`trait${i}_id`] = tr.id ?? "";
        out[`trait${i}_name`] = tr.id === undefined || tr.id === null || tr.id === "" ? "" : (state.passiveMap.get(Number(tr.id))?.name || "وœھç™»éŒ²مƒ‘مƒƒم‚·مƒ–");
        out[`trait${i}_level`] = tr.level ?? "";
        out[`trait${i}_custom`] = tr.custom ?? "";
      }
      out.archives_json = jsonCell(m.archives || []);
      out.acts_json = jsonCell(m.acts || []);
      out.drops_json = jsonCell(m.drops || normalizeDrops());
      out.elmRes_json = jsonCell(m.elmRes || {});
      out.resists_json = jsonCell(m.resists || {});
      out.traits_json = jsonCell(m.traits || []);
      return headers.map((h) => csvEscape(out[h]));
    });
    return "\uFEFF" + [headers.map(csvEscape).join(","), ...rows.map((r) => r.join(","))].join("\n");
  }

  function importCsvText(text){
    const rows = parseCsv(text);
    if (rows.length < 2) throw new Error("CSVمپ«مƒ‡مƒ¼م‚؟è،ŒمپŒمپ‚م‚ٹمپ¾مپ›م‚“م€‚");
    const headers = rows[0].map((h) => String(h || "").trim());
    const hidx = new Map(headers.map((h, i) => [h, i]));
    const cell = (row, name) => hidx.has(name) ? (row[hidx.get(name)] ?? "") : "";
    const hasAny = (row, names) => names.some((name) => String(cell(row, name)).trim() !== "");
    const maxAct = headers.reduce((max, h) => Math.max(max, Number((h.match(/^act(\d+)_id$/) || [])[1] || 0)), 0);
    const maxTrait = headers.reduce((max, h) => Math.max(max, Number((h.match(/^trait(\d+)_id$/) || [])[1] || 0)), 0);
    const elmKeys = headers.filter((h) => h.startsWith("elmRes_")).map((h) => h.slice("elmRes_".length));
    const resistKeys = headers.filter((h) => h.startsWith("resist_")).map((h) => h.slice("resist_".length));

    const imported = rows.slice(1).filter((row) => row.some((v) => String(v || "").trim() !== "")).map((row) => {
      let acts = [];
      for (let i = 1; i <= maxAct; i++) {
        const names = [`act${i}_id`, `act${i}_rate`, `act${i}_condition`];
        if (!hasAny(row, names)) continue;
        acts.push({ id: nullableNumCell(cell(row, `act${i}_id`)), rate: numCell(cell(row, `act${i}_rate`), 0), condition: numCell(cell(row, `act${i}_condition`), 0) });
      }
      if (!acts.length && String(cell(row, "acts_json")).trim()) {
        try { acts = JSON.parse(cell(row, "acts_json")); } catch(e) { acts = []; }
      }

      let traits = [];
      for (let i = 1; i <= maxTrait; i++) {
        const names = [`trait${i}_id`, `trait${i}_level`, `trait${i}_custom`];
        if (!hasAny(row, names)) continue;
        traits.push({ id: nullableNumCell(cell(row, `trait${i}_id`)), level: numCell(cell(row, `trait${i}_level`), 1), custom: cell(row, `trait${i}_custom`) || undefined });
      }
      if (!traits.length && String(cell(row, "traits_json")).trim()) {
        try { traits = JSON.parse(cell(row, "traits_json")); } catch(e) { traits = []; }
      }

      let elmRes = {};
      elmKeys.forEach((k) => { const v = cell(row, `elmRes_${k}`); if (String(v).trim() !== "") elmRes[k] = numCell(v, 0); });
      if (!Object.keys(elmRes).length && String(cell(row, "elmRes_json")).trim()) {
        try { elmRes = JSON.parse(cell(row, "elmRes_json")) || {}; } catch(e) { elmRes = {}; }
      }

      let resists = {};
      resistKeys.forEach((k) => { const v = cell(row, `resist_${k}`); if (String(v).trim() !== "") resists[k] = numCell(v, 0); });
      if (!Object.keys(resists).length && String(cell(row, "resists_json")).trim()) {
        try { resists = JSON.parse(cell(row, "resists_json")) || {}; } catch(e) { resists = {}; }
      }

      let archives = [];
      if (String(cell(row, "archives_json")).trim()) {
        try { archives = JSON.parse(cell(row, "archives_json")) || []; } catch(e) { archives = []; }
      }

      let drops = {
        normal: { id: nullableNumCell(cell(row, "dropNormalId")), rate: numCell(cell(row, "dropNormalRate"), 0) },
        rare: { id: nullableNumCell(cell(row, "dropRareId")), rate: numCell(cell(row, "dropRareRate"), 0) },
      };
      if (!hasAny(row, ["dropNormalId","dropNormalRate","dropRareId","dropRareRate"]) && String(cell(row, "drops_json")).trim()) {
        try { drops = JSON.parse(cell(row, "drops_json")) || drops; } catch(e) {}
      }

      const raw = {
        id: numCell(cell(row, "id"), 0), name: cell(row, "name"), race: cell(row, "race"), rank: numCell(cell(row, "rank"), 1), minF: numCell(cell(row, "minF"), 1),
        hp: numCell(cell(row, "hp"), 0), mp: numCell(cell(row, "mp"), 0), atk: numCell(cell(row, "atk"), 0), def: numCell(cell(row, "def"), 0), spd: numCell(cell(row, "spd"), 0), mag: numCell(cell(row, "mag"), 0), mdef: numCell(cell(row, "mdef"), 0),
        hit: numCell(cell(row, "hit"), 0), eva: numCell(cell(row, "eva"), 0), cri: numCell(cell(row, "cri"), 0), gold: numCell(cell(row, "gold"), 0), exp: numCell(cell(row, "exp"), 0), actCount: numCell(cell(row, "actCount"), 1),
        isBoss: boolCell(cell(row, "isBoss")), isRare: boolCell(cell(row, "isRare")), isEstark: boolCell(cell(row, "isEstark")), isSpecialBoss: boolCell(cell(row, "isSpecialBoss")), isElite: boolCell(cell(row, "isElite")),
        img: cell(row, "img") || undefined, acts, drops, elmRes, resists, traits, archives,
      };
      const group = cell(row, "sourceGroup") || (raw.isSpecialBoss || raw.isEstark ? "special" : raw.isBoss ? "boss" : raw.isRare ? "rare" : "band");
      const inferred = inferBand(raw.minF);
      return normalizeMonster(raw, {
        group,
        bandStart: cell(row, "bandStart") === "" ? inferred.start : numCell(cell(row, "bandStart"), inferred.start),
        bandEnd: cell(row, "bandEnd") === "" ? inferred.end : numCell(cell(row, "bandEnd"), inferred.end),
        offsetType: cell(row, "offsetType") || inferred.offsetType || "",
      });
    });
    if (!imported.length) throw new Error("هڈ–م‚ٹè¾¼م‚پم‚‹مƒ¢مƒ³م‚¹م‚؟مƒ¼è،ŒمپŒمپ‚م‚ٹمپ¾مپ›م‚“م€‚");
    state.monsters = imported.sort((a,b) => Number(a.id)-Number(b.id));
    state.selectedUid = state.monsters[0]?._uid || null;
    state.exportText = "";
    refreshRawJson();
    state.lastMessage = `CSVمپ‹م‚‰${state.monsters.length}ن»¶م‚’هڈ–م‚ٹè¾¼مپ؟مپ¾مپ—مپں`;
    render();
  }

  function triggerCsvImport(){
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".csv,text/csv";
    input.onchange = () => {
      const file = input.files && input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try { importCsvText(reader.result); }
        catch(err) { alert(`CSVهڈ–م‚ٹè¾¼مپ؟مپ«ه¤±و•—مپ—مپ¾مپ—مپں: ${err.message}`); }
      };
      reader.readAsText(file, "utf-8");
    };
    input.click();
  }

  function downloadBlob(filename, text, type){
    const blob = new Blob([text], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function downloadText(filename, text){
    downloadBlob(filename, text, "text/javascript;charset=utf-8");
  }

  document.addEventListener("input", (e) => {
    const t = e.target; const m = selected();
    if (t.id === "q") { state.q = t.value; renderSidebar(); return; }
    if (!m) return;
    if (t.dataset.field) { const f = t.dataset.field; m[f] = numericFields.has(f) ? Number(t.value) : t.value; if (["id","name","race","rank","minF","hp","_bandStart","_bandEnd","_offsetType"].includes(f)) updateMainHeaderOnly(); return; }
    if (t.dataset.actIndex !== undefined) { const a = m.acts[Number(t.dataset.actIndex)]; if (!a) return; const f = t.dataset.actField; a[f] = f === "id" ? toNumberOrNull(t.value) : Number(t.value); return; }
    if (t.dataset.dropKind) { const d = m.drops[t.dataset.dropKind]; const f = t.dataset.dropField; d[f] = f === "id" ? toNumberOrNull(t.value) : Number(t.value); return; }
    if (t.dataset.elm) { m.elmRes[t.dataset.elm] = Number(t.value); return; }
    if (t.dataset.resist) { m.resists[t.dataset.resist] = Number(t.value); return; }
    if (t.dataset.traitIndex !== undefined) { const tr = m.traits[Number(t.dataset.traitIndex)]; if (!tr) return; const f = t.dataset.traitField; tr[f] = f === "id" ? toNumberOrNull(t.value) : (f === "level" ? Number(t.value) : t.value); return; }
    if (t.dataset.archiveIndex !== undefined) { m.archives[Number(t.dataset.archiveIndex)] = t.value; return; }
    if (t.id === "rawJson") { state.rawJsonText = t.value; return; }
    if (t.id === "exportText") { state.exportText = t.value; return; }
  });

  document.addEventListener("change", (e) => {
    const t = e.target; const m = selected();
    if (t.id === "flagFilter") { state.flagFilter = t.value; renderSidebar(); return; }
    if (t.id === "sortMode") { state.sortMode = t.value; renderSidebar(); return; }
    if (t.id === "exportMode") { state.exportMode = "full"; return; }
    if (!m) return;
    if (t.dataset.flag) { m[t.dataset.flag] = t.checked; render(); return; }
    if (t.dataset.actIndex !== undefined || t.dataset.dropKind || t.dataset.traitIndex !== undefined || t.dataset.field === "race" || t.dataset.field === "_offsetType") renderMain();
  });

  document.addEventListener("click", async (e) => {
    const button = e.target.closest("button"); if (!button) return;
    const m = selected();
    if (button.dataset.select) { state.selectedUid = button.dataset.select; state.tab = "basic"; refreshRawJson(); render(); return; }
    if (button.dataset.tab) { state.tab = button.dataset.tab; if (state.tab === "json") refreshRawJson(); renderMain(); return; }
    const action = button.dataset.action; if (!action) return;
    if (action === "reloadPage") { location.reload(); return; }
    if (action === "addMonster") return addMonster();
    if (action === "exportTab") { state.tab = "export"; renderMain(); return; }
    if (action === "csvTab") { state.tab = "csv"; renderMain(); return; }
    if (!m && !["generateExport","copyExport","downloadExport","downloadCsv","importCsv"].includes(action)) return;
    if (action === "duplicateMonster") { const copy = normalizeMonster(cleanMonster(m), { group: effectiveGroup(m), bandStart: m._bandStart, bandEnd: m._bandEnd, offsetType: m._offsetType }); copy.id = Number(copy.id) + 0.001; copy.name = `${copy.name || "MONSTER"} è¤‡è£½`; state.monsters.push(copy); state.selectedUid = copy._uid; render(); return; }
    if (action === "deleteMonster") { if (!confirm(`${m.name || m.id} م‚’ه‰ٹé™¤مپ—مپ¾مپ™مپ‹ï¼ں`)) return; state.monsters = state.monsters.filter((x) => x._uid !== m._uid); state.selectedUid = state.monsters[0]?._uid || null; render(); return; }
    if (action === "sortById") { state.monsters.sort((a,b) => Number(a.id)-Number(b.id)); render(); return; }
    if (action === "addAct") { m.acts.push({ id: 1, rate: 10, condition: 0 }); renderMain(); return; }
    if (action === "removeAct") { m.acts.splice(Number(button.dataset.index), 1); renderMain(); return; }
    if (action === "normalizeActRates") { const n = m.acts.length; if (n) { const base = Math.floor((100 / n) * 10) / 10; m.acts.forEach((a) => a.rate = base); m.acts[n - 1].rate = Math.round((100 - base * (n - 1)) * 10) / 10; } renderMain(); return; }
    if (action === "sortActsByRate") { m.acts.sort((a,b) => Number(b.rate)-Number(a.rate)); renderMain(); return; }
    if (action === "addElm") { const key = $("newElmKey")?.value.trim(); if (key) m.elmRes[key] = Number($("newElmVal")?.value || 0); renderMain(); return; }
    if (action === "addResist") { const key = $("newResistKey")?.value.trim(); if (key) m.resists[key] = Number($("newResistVal")?.value || 0); renderMain(); return; }
    if (action === "addTrait") { m.traits.push({ id: state.passives[0]?.id ?? null, level: 1 }); renderMain(); return; }
    if (action === "removeTrait") { m.traits.splice(Number(button.dataset.index), 1); renderMain(); return; }
    if (action === "addArchive") { m.archives.push(""); renderMain(); return; }
    if (action === "removeArchive") { m.archives.splice(Number(button.dataset.index), 1); renderMain(); return; }
    if (action === "refreshRawJson") { refreshRawJson(); renderMain(); return; }
    if (action === "applyRawJson") { try { const parsed = JSON.parse($("rawJson").value); const normalized = normalizeMonster(parsed, { group: effectiveGroup(m), bandStart: m._bandStart, bandEnd: m._bandEnd, offsetType: m._offsetType }); const idx = state.monsters.findIndex((x) => x._uid === m._uid); normalized._uid = m._uid; state.monsters[idx] = normalized; state.lastMessage = "JSONم‚’éپ©ç”¨مپ—مپ¾مپ—مپں"; refreshRawJson(); render(); } catch(err) { alert(`JSONمپ®è§£و‍گمپ«ه¤±و•—مپ—مپ¾مپ—مپں: ${err.message}`); } return; }
    if (action === "generateExport") { generateExport(); return; }
    if (action === "copyExport") { const boxText = $("exportText")?.value || ""; const text = boxText.includes("const MONSTER_BANDS_1_200") ? boxText : buildExport(); state.exportText = text; try { await navigator.clipboard.writeText(text); state.lastMessage = "ه®Œه…¨ç‰ˆم‚’م‚³مƒ”مƒ¼مپ—مپ¾مپ—مپں"; } catch(err) { state.lastMessage = "م‚³مƒ”مƒ¼مپ«ه¤±و•—مپ—مپ¾مپ—مپںم€‚و‰‹ه‹•مپ§éپ¸وٹ‍مپ—مپ¦مپڈمپ مپ•مپ„م€‚"; } renderMain(); return; }
    if (action === "downloadExport") { const boxText = $("exportText")?.value || ""; const text = boxText.includes("const MONSTER_BANDS_1_200") ? boxText : buildExport(); downloadText("monsters.js", text); state.lastMessage = "ه®Œه…¨ç‰ˆ monsters.js مپ®مƒ€م‚¦مƒ³مƒ­مƒ¼مƒ‰م‚’é–‹ه§‹مپ—مپ¾مپ—مپں"; renderMain(); return; }
    if (action === "downloadCsv") { const csv = buildCsv(); downloadBlob("monsters_editor_id_order.csv", csv, "text/csv;charset=utf-8"); state.lastMessage = `IDé †CSVم‚’ه‡؛هٹ›مپ—مپ¾مپ—مپںï¼ˆ${state.monsters.length}ن»¶ï¼‰`; renderMain(); return; }
    if (action === "importCsv") { triggerCsvImport(); return; }
  });

  initData(); render();
})();
